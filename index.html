<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Рефлексія — Сходинки 🪜</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Bagel+Fat+One&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Fredoka', sans-serif; background: #fffbe8;
    background-image: radial-gradient(circle at 15% 90%, #ffe4f5 0%, transparent 30%), radial-gradient(circle at 90% 10%, #fff0a8 0%, transparent 30%);
    min-height: 100vh; padding: 20px; color: #2d1810;
  }
  .container { max-width: 900px; margin: 0 auto; }
  header { text-align: center; margin-bottom: 14px; }
  h1 { font-size: clamp(22px, 4vw, 34px); font-weight: 700; color: #b8431f; font-style: italic; }
  .subtitle { font-size: clamp(13px,1.8vw,16px); color: #5a3020; margin-top: 6px; line-height: 1.45; }
  .name-row {
    background: white; padding: 14px 22px; border-radius: 18px; margin: 16px 0;
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap; box-shadow: 0 4px 0 #f0d0a0;
  }
  .name-row label { font-weight: 600; font-size: 17px; }
  .name-row input { flex: 1; min-width: 200px; border: 3px solid #ffe0b0; border-radius: 12px; padding: 9px 14px; font-size: 16px; font-family: inherit; background: #fffaf0; }
  .name-row input:focus { outline: none; border-color: #e8a030; }

  .instr { text-align: center; font-size: 17px; font-weight: 600; color: #b8431f; margin-bottom: 8px; }
  .character-display { text-align: center; font-size: 48px; margin-bottom: 12px; min-height: 56px; }
  .stairs { display: flex; flex-direction: column-reverse; gap: 8px; max-width: 560px; margin: 0 auto; }
  .stair {
    border-radius: 12px; padding: 14px 18px; font-weight: 600; cursor: pointer;
    box-shadow: 0 4px 0 rgba(0,0,0,0.15); transition: transform 0.15s; position: relative;
    display: flex; align-items: center; gap: 10px; font-size: 14.5px;
  }
  .stair:hover { transform: translateX(6px); }
  .stair.selected { transform: translateX(10px) scale(1.02); outline: 4px solid #2d1810; }
  .stair .marker { font-size: 26px; opacity: 0; transition: opacity 0.2s; }
  .stair.selected .marker { opacity: 1; }
  .stair-1 { background: #ffb38a; }
  .stair-2 { background: #c89aef; color: white; }
  .stair-3 { background: #6ab8f0; color: white; }
  .stair-4 { background: #ff5a8a; color: white; }
  .stair-5 { background: #ffd93d; }
  .stair-6 { background: #6ee06e; }
  .stair-level { font-size: 11px; opacity: 0.6; margin-left: auto; }

  .rating-block { text-align: center; margin: 24px 0 8px; }
  .rating-label { font-weight: 700; margin-bottom: 10px; color: #b8431f; }
  .stars { display: flex; gap: 8px; justify-content: center; }
  .star-rate { font-size: 38px; cursor: pointer; filter: grayscale(1); opacity: 0.4; transition: all 0.15s; user-select: none; }
  .star-rate.active { filter: none; opacity: 1; transform: scale(1.1); }
  .star-rate:hover { transform: scale(1.2); }

  .actions { margin-top: 22px; display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  button.action-btn { font-family: 'Fredoka', sans-serif; font-size: 16px; font-weight: 600; padding: 14px 24px; border: none; border-radius: 16px; cursor: pointer; transition: transform 0.1s, box-shadow 0.1s; color: white; }
  .btn-save { background: #2d8a3e; box-shadow: 0 5px 0 #1c5a28; }
  .btn-print { background: #4a6cf7; box-shadow: 0 5px 0 #2a47c0; }
  .btn-clear { background: #8a3422; box-shadow: 0 5px 0 #5a2010; }
  .action-btn:hover { transform: translateY(-2px); }
  .action-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.3); }
  .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(120%); background: #1f3a23; color: white; padding: 14px 24px; border-radius: 14px; font-weight: 600; transition: transform 0.3s; z-index: 999; }
  .toast.show { transform: translateX(-50%) translateY(0); }
  @media print {
    body { background: white; padding: 8mm; }
    .actions { display: none; }
    .stair { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>🪜 Постав свого персонажа на сходинку</h1>
    <div class="subtitle">Обери ту сходинку, яка найкраще описує, як ти почуваєшся після уроку про прототипування.</div>
  </header>

  <div class="name-row">
    <label for="name">✏️ Твоє ім'я:</label>
    <input type="text" id="name" placeholder="Напиши тут своє ім'я та клас">
  </div>

  <div class="instr">👇 Натисни на сходинку, де зараз твій персонаж 🦸</div>
  <div class="character-display" id="charDisplay"></div>

  <div class="stairs" id="stairs"></div>

  <div class="rating-block">
    <div class="rating-label">⭐ Оціни урок від 1 до 5:</div>
    <div class="stars" id="stars">
      <span class="star-rate" data-v="1">⭐</span>
      <span class="star-rate" data-v="2">⭐</span>
      <span class="star-rate" data-v="3">⭐</span>
      <span class="star-rate" data-v="4">⭐</span>
      <span class="star-rate" data-v="5">⭐</span>
    </div>
  </div>

  <div class="actions">
    <button class="action-btn btn-save" onclick="downloadWork()">💾 Завантажити мою роботу</button>
    <button class="action-btn btn-print" onclick="window.print()">🖨️ Друкувати / Зберегти PDF</button>
    <button class="action-btn btn-clear" onclick="clearAll()">🗑️ Очистити все</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
  const STORAGE_KEY = 'rfx_skhodynky_v1';
  // from lowest (bottom) to highest (top)
  const STAIRS = [
    "Мені було важко",
    "Я почуваюсь втомлено",
    "Я знаю, що таке прототипування",
    "Я добре працював(ла) на уроці",
    "Я знаю, навіщо створювати прототип",
    "Я вмію створювати прототипи"
  ];
  const CHAR = '🦸';
  let selectedStair = -1;
  let rating = 0;

  function render() {
    const wrap = document.getElementById('stairs');
    wrap.innerHTML = '';
    STAIRS.forEach((txt, i) => {
      const div = document.createElement('div');
      div.className = `stair stair-${i+1}` + (i === selectedStair ? ' selected' : '');
      div.innerHTML = `<span class="marker">${CHAR}</span><span>${txt}</span><span class="stair-level">сходинка ${i+1}</span>`;
      div.onclick = () => { selectedStair = i; render(); save(); };
      wrap.appendChild(div);
    });
    document.getElementById('charDisplay').textContent = selectedStair >= 0 ? CHAR : '';
    document.querySelectorAll('.star-rate').forEach(s => s.classList.toggle('active', parseInt(s.dataset.v) <= rating));
  }
  document.querySelectorAll('.star-rate').forEach(s => s.onclick = () => { rating = parseInt(s.dataset.v); render(); save(); });

  function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify({ name: document.getElementById('name').value, stair: selectedStair, rating })); }
  function load() {
    try { const d = JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');
      if(d.name) document.getElementById('name').value = d.name;
      if(typeof d.stair === 'number') selectedStair = d.stair;
      if(d.rating) rating = d.rating;
    } catch(e){}
    render();
  }
  function showToast(m){ const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }
  function downloadWork() {
    const name = document.getElementById('name').value.trim() || 'Без імені';
    const date = new Date().toLocaleDateString('uk-UA');
    const stairTxt = selectedStair >= 0 ? `${STAIRS[selectedStair]} (сходинка ${selectedStair+1} з ${STAIRS.length})` : '(не обрано)';
    const text = `РЕФЛЕКСІЯ — СХОДИНКИ (ПРОТОТИПУВАННЯ)\n========================================\nУчень/учениця: ${name}\nДата: ${date}\n\n🪜 Моя сходинка: ${stairTxt}\n⭐ Оцінка уроку: ${rating ? rating + '/5' : '(не поставлено)'}\n`;
    const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob); const link = document.createElement('a');
    const safeName = name.replace(/[^а-яА-Яa-zA-Z0-9_\-\s]/g,'').replace(/\s+/g,'_') || 'робота';
    link.href = url; link.download = `Рефлексія_сходинки_${safeName}.txt`; link.click(); URL.revokeObjectURL(url);
    showToast('✅ Робота завантажена!');
  }
  function clearAll() { if(!confirm('Очистити вибір?')) return; selectedStair = -1; rating = 0; document.getElementById('name').value=''; localStorage.removeItem(STORAGE_KEY); render(); showToast('Все очищено'); }
  document.getElementById('name').addEventListener('input', save);
  load();
</script>
</body>
</html>
